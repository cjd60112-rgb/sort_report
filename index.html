<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>排序演算法</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #c9d9dd;
    }

    .home-card {
      width: 420px;
      margin: 48px auto;
      background: #f4f4f4;
      border-radius: 24px;
      padding: 42px 40px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
    }

    .home-card h1 {
      text-align: center;
      font-size: 32px;
      color: #2f2f2f;
      margin: 0 0 34px;
    }

    .home-card a {
      display: block;
      color: #0066ff;
      text-decoration: none;
      font-size: 24px;
      margin: 28px 0;
      line-height: 1.5;
    }

    .home-card a:hover {
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      .home-card {
        width: 88%;
        padding: 32px 26px;
      }

      .home-card h1 {
        font-size: 28px;
      }

      .home-card a {
        font-size: 21px;
      }
    }
  </style>
</head>
